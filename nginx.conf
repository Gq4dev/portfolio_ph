server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Emit relative redirects so trailing-slash redirects (e.g. /admin ->
    # /admin/) work behind a reverse proxy / port mapping instead of
    # pointing at the internal localhost:80.
    absolute_redirect off;

    # Compression
    gzip on;
    gzip_comp_level 6;
    gzip_types text/css application/javascript application/json image/svg+xml application/xml;
    gzip_min_length 1024;

    # Hashed build assets — safe to cache forever
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Self-hosted fonts — cache forever
    location ~* \.(?:woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Embedded Sanity Studio (client-side SPA): internal routes have no
    # matching file, so fall back to the Studio's index.
    location /admin {
        try_files $uri $uri/ /admin/index.html;
    }

    # Static site — Astro emits <route>/index.html for each page.
    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
}
